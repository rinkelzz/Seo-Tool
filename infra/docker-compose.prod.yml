# Production stack for Portainer / GHCR-based deployment.
#
# All env vars come from the Portainer stack environment (or the .env in the
# stack directory). Replace ${IMAGE_REPO} with your GHCR path, e.g.
#   ghcr.io/your-github-user/seo-tool
# and ${IMAGE_TAG} with the version tag (default: latest).

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-seo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-seo}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-seo} -d ${POSTGRES_DB:-seo}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    image: ${IMAGE_REPO}:${IMAGE_TAG:-latest}
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-seo}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-seo}
      REDIS_URL: redis://redis:6379/0
      APP_ENV: production
      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-INFO}
      APP_API_TOKEN: ${APP_API_TOKEN:?APP_API_TOKEN must be set}
      CRAWLER_USER_AGENT: ${CRAWLER_USER_AGENT:-SeoToolBot/0.1}
      CRAWLER_MAX_CONCURRENCY: ${CRAWLER_MAX_CONCURRENCY:-8}
    ports:
      - "${BACKEND_PORT:-8080}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn backend.app.main:app --host 0.0.0.0 --port 8000"
    restart: unless-stopped

  worker:
    image: ${IMAGE_REPO}:${IMAGE_TAG:-latest}
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-seo}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-seo}
      REDIS_URL: redis://redis:6379/0
      APP_ENV: production
      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-INFO}
      APP_API_TOKEN: ${APP_API_TOKEN}
      LANGUAGETOOL_URL: http://languagetool:8010
      CRAWLER_SPELLCHECK_ENABLED: ${CRAWLER_SPELLCHECK_ENABLED:-false}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    command: python -m worker.main
    restart: unless-stopped

  # Optional Tippfehler-Service (Phase 4B). Container ist immer da, der
  # Worker fragt ihn aber nur an, wenn CRAWLER_SPELLCHECK_ENABLED=true im
  # Stack-Env steht. ~600 MB RAM-Verbrauch, ~2 GB Image. Wenn euch das
  # auf dem LXC zu schwer ist: in Portainer den Service stoppen und
  # CRAWLER_SPELLCHECK_ENABLED auf false lassen.
  languagetool:
    image: erikvl87/languagetool:latest
    environment:
      Java_Xms: "256m"
      Java_Xmx: "1g"
    expose:
      - "8010"
    restart: unless-stopped

  web:
    # Frontend (Next.js). Built on the LXC from ../web at deploy time.
    # Long-term we should build it in GH Actions and push as a separate
    # GHCR image, then switch this to image: ghcr.io/.../seo-tool-web.
    build:
      context: ../web
      dockerfile: Dockerfile
    environment:
      # Frontend talks to the backend over the internal Docker network.
      API_URL: http://backend:8000
      # Same APP_API_TOKEN as backend - frontend forwards it server-side,
      # never exposes it to the browser.
      API_TOKEN: ${APP_API_TOKEN}
      NODE_ENV: production
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
  redis_data:
